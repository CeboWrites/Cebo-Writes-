<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebo's To-Do List - Organized Creative Tasks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📝 Cebo's To-Do List</h1>
                <p class="subtitle">Organize your Poetry, Fashion, Vlogs, Podcasts & Newsletter tasks</p>
            </div>
        </header>

        <!-- Main App -->
        <main class="main-app">
            <!-- Category Tabs -->
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">
                    <span>📋</span> All Tasks
                </button>
                <button class="tab-btn" data-category="poetry">
                    <span>🖋️</span> Poetry
                </button>
                <button class="tab-btn" data-category="fashion">
                    <span>👗</span> Fashion
                </button>
                <button class="tab-btn" data-category="vlogs">
                    <span>🎥</span> Vlogs
                </button>
                <button class="tab-btn" data-category="podcasts">
                    <span>🎙️</span> Podcasts
                </button>
                <button class="tab-btn" data-category="newsletter">
                    <span>📰</span> Newsletter
                </button>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <select id="categorySelect" class="category-select">
                        <option value="poetry">🖋️ Poetry</option>
                        <option value="fashion">👗 Fashion</option>
                        <option value="vlogs">🎥 Vlogs</option>
                        <option value="podcasts">🎙️ Podcasts</option>
                        <option value="newsletter">📰 Newsletter</option>
                    </select>
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <button id="addBtn" class="add-btn">+ Add Task</button>
                </div>
            </div>

            <!-- Filter and Sort Section -->
            <div class="controls-section">
                <div class="filter-group">
                    <button id="filterAll" class="filter-btn active">All</button>
                    <button id="filterActive" class="filter-btn">Active</button>
                    <button id="filterCompleted" class="filter-btn">Completed</button>
                </div>
                <div class="sort-group">
                    <select id="sortSelect" class="sort-select">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="priority">High Priority First</option>
                        <option value="name">A-Z</option>
                    </select>
                </div>
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
            </div>

            <!-- Tasks List -->
            <div class="tasks-container">
                <div id="tasksList" class="tasks-list">
                    <!-- Tasks will be rendered here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-section">
                <div class="stat-card">
                    <span class="stat-label">Total Tasks</span>
                    <span id="totalTasks" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Completed</span>
                    <span id="completedTasks" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Remaining</span>
                    <span id="remainingTasks" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Progress</span>
                    <span id="progressPercent" class="stat-value">0%</span>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>💾 Your tasks are automatically saved to your browser's local storage</p>
            <p>© 2024 Cebo Writes | <a href="https://github.com/CeboWrites/Cebo-Writes-">View on GitHub</a></p>
        </footer>
    </div>

    <!-- Task Template (hidden) -->
    <template id="taskTemplate">
        <div class="task-item" data-id="">
            <div class="task-checkbox">
                <input type="checkbox" class="task-complete-input" />
            </div>
            <div class="task-content">
                <h3 class="task-title"></h3>
                <div class="task-meta">
                    <span class="task-category"></span>
                    <span class="task-priority"></span>
                    <span class="task-date"></span>
                </div>
            </div>
            <div class="task-actions">
                <button class="task-edit-btn" title="Edit task">✏️</button>
                <button class="task-delete-btn" title="Delete task">🗑️</button>
            </div>
        </div>
    </template>

    <!-- Edit Modal -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button id="closeModal" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <input 
                    type="text" 
                    id="editTaskInput" 
                    class="edit-input" 
                    placeholder="Task description"
                >
                <select id="editCategorySelect" class="category-select">
                    <option value="poetry">🖋️ Poetry</option>
                    <option value="fashion">👗 Fashion</option>
                    <option value="vlogs">🎥 Vlogs</option>
                    <option value="podcasts">🎙️ Podcasts</option>
                    <option value="newsletter">📰 Newsletter</option>
                </select>
                <select id="editPrioritySelect" class="priority-select">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
            </div>
            <div class="modal-footer">
                <button id="cancelEditBtn" class="cancel-btn">Cancel</button>
                <button id="saveEditBtn" class="save-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
